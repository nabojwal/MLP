
program: src/train.py

command:
  - C:\Users\nabin\da6401_assignment_1\venv\Scripts\python.exe
  - -m
  - src.train
  - ${args}

method: random

metric:
  name: final_val_accuracy
  goal: maximize

parameters:

  learning_rate:
    values: [0.0005, 0.001, 0.005, 0.01]

  batch_size:
    values: [32, 64, 128]

  optimizer:
    values: ["sgd", "momentum", "nag", "rmsprop", "adam", "nadam"]

  activation:
    values: ["relu", "tanh"]

  num_layers:
    values: [2,3,4]

  hidden_size:
    values: [64,128]

  epochs:
    values: [5,10]

  dataset:
    values: ["mnist"]

  loss:
    values: ["cross_entropy"]

  weight_init:
    values: ["xavier"]